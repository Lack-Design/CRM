  input[type=text]:focus { border-color:#1A3A6B; box-shadow:0 0 0 2px rgba(26,58,107,.12); }
  select { padding:7px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; background:#fff; cursor:pointer; outline:none; }
  select:focus { border-color:#1A3A6B; }
  .btn { padding:7px 13px; border:none; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; }
  .btn-primary { background:#1A3A6B; color:#fff; }
  .btn-primary:hover { background:#2a5298; }
  .btn-success { background:#059669; color:#fff; }
  .btn-success:hover { background:#047857; }
  .btn-danger { background:#dc2626; color:#fff; }
  .btn-danger:hover { background:#b91c1c; }
  .btn-secondary { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
  .btn-secondary:hover { background:#e5e7eb; }

  /* STATS */

  .stat-item { display:flex; align-items:center; gap:4px; }
  .stat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  /* TABLE */

  table { width:100%; border-collapse:collapse; background:#fff; min-width:900px; }
  th { background:#f9fafb; padding:9px 10px; text-align:left; font-size:10px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; border-bottom:2px solid #e5e7eb; cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { background:#f3f4f6; color:#1A3A6B; }
  td { padding:8px 10px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
  tr:hover td { background:#f9fafb; }
  tr.exclu td { opacity:.4; }

  .nom-cell .nom { font-weight:500; color:#111; }
  .nom-cell .org { font-size:10px; color:#9ca3af; margin-top:1px; }

  .tel-cell a { color:#1A3A6B; text-decoration:none; font-weight:500; font-size:12px; }
  .tel-cell a:hover { text-decoration:underline; }
  .tel2 { font-size:10px; color:#9ca3af; }

  .email-cell { font-size:11px; }
  .email-cell a { color:#6b7280; text-decoration:none; }
  .email-cell a:hover { color:#1A3A6B; }
  .no-email { color:#d1d5db; }

  /* CHECKBOX EMAIL */
  .check-email { width:16px; height:16px; cursor:pointer; accent-color:#1A3A6B; }

  /* BADGES SECTEUR */
  .badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:500; }

  .badge-Sanitaire { background:#dbeafe; color:#1e40af; }
  .badge-Menuiserie { background:#d1fae5; color:#065f46; }
  .badge-Carrelage { background:#ede9fe; color:#5b21b6; }
  .badge-Cuisine { background:#fce7f3; color:#9d174d; }
  .badge-Autre { background:#f3f4f6; color:#6b7280; }

  .statut-sel { padding:4px 6px; border-radius:4px; font-size:11px; cursor:pointer; border:1px solid; font-weight:500; max-width:130px; }
  .st-mail-envoyer { border-color:#fbbf24; color:#92400e; background:#fffbeb; }
  .st-mail-envoye { border-color:#60a5fa; color:#1e40af; background:#eff6ff; }
  .st-reponse { border-color:#34d399; color:#065f46; background:#ecfdf5; }
  .st-interesse { border-color:#10b981; color:#064e3b; background:#d1fae5; }
  .st-relancer { border-color:#f87171; color:#991b1b; background:#fef2f2; }
  .st-pas-interesse { border-color:#d1d5db; color:#6b7280; background:#f9fafb; }
  .st-exclu { border-color:#6b7280; color:#374151; background:#f3f4f6; }

  /* DATE + NOTES */
  .date-input { padding:4px 6px; border:1px solid #e5e7eb; border-radius:4px; font-size:11px; width:100px; }
  .date-input:focus { border-color:#1A3A6B; outline:none; }
  .notes-input { padding:4px 6px; border:1px solid #e5e7eb; border-radius:4px; font-size:11px; width:100%; min-width:80px; }
  .notes-input:focus { border-color:#1A3A6B; outline:none; }

  /* BTN SUPPR */
  .btn-del { background:none; border:none; color:#d1d5db; cursor:pointer; font-size:15px; padding:2px 6px; border-radius:4px; }
  .btn-del:hover { color:#dc2626; background:#fef2f2; }

  /* EMPTY */
  .empty { text-align:center; padding:50px; color:#9ca3af; background:#fff; }

  /* MODAL */

    </div>
  </div>
</div>

let data = [];
let sortCol = 'nom';
let sortAsc = true;
let deleteId = null;
let saveTimer = null;

// ---- GOOGLE DRIVE INIT ----
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    gapiInited = true;
    maybeEnableDrive();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setIndicator('● Erreur Drive', false); return; }
      driveConnected = true;
      document.getElementById('driveBtn').textContent = '✓ Drive connecté';
      document.getElementById('driveBtn').style.background = 'rgba(134,239,172,.25)';
      await loadFromDrive();
    }
  });
  gisInited = true;
  maybeEnableDrive();
}

function maybeEnableDrive() {
  if (gapiInited && gisInited) {
    document.getElementById('driveBtn').disabled = false;
  }
}

function driveConnect() {
  if (!gapiInited || !gisInited) { alert('API Google pas encore chargée, patientez.'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function findDriveFile() {
  const res = await gapi.client.drive.files.list({
    q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
    spaces: 'drive', fields: 'files(id,name)'
  });
  const files = res.result.files;
  return files && files.length ? files[0].id : null;
}

async function loadFromDrive() {
  setIndicator('● Chargement Drive...', false);
  try {
    driveFileId = await findDriveFile();
    if (driveFileId) {
      const res = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
      data = JSON.parse(res.body);
      setIndicator('● Drive chargé', true);
    } else {
      // Pas encore de fichier Drive — utiliser données locales
      loadLocal();
      setIndicator('● Drive prêt (nouveau fichier)', true);
    }
  } catch(e) {
    loadLocal();
    setIndicator('● Erreur Drive, données locales', false);
  }
  applyFilters();
}

async function saveToDrive() {
  const json = JSON.stringify(data);
  const blob = new Blob([json], { type: 'application/json' });
  if (driveFileId) {
    await gapi.client.request({
      path: `/upload/drive/v3/files/${driveFileId}`,
      method: 'PATCH',
      params: { uploadType: 'media' },
      body: json
    });
  } else {
    const meta = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token },
      body: form
    });
    const d = await res.json();
    driveFileId = d.id;
  }
  // Aussi en local comme backup
  localStorage.setItem(STORAGE_KEY, json);
  setIndicator('● Sauvegardé', true);
}

function setIndicator(msg, ok) {
  const ind = document.getElementById('saveIndicator');
  ind.textContent = msg;
  ind.className = 'save-indicator' + (ok ? ' saved' : '');
}

// ---- INIT LOCAL (fallback) ----
function loadLocal() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) { data = INIT_DATA.slice(); }
  } else {
    data = INIT_DATA.slice();
  }
}

function init() {
  loadLocal();
  applyFilters();
  setIndicator('● Local (connectez Drive)', false);
  // Auto-init GAPI
  if (typeof gapi !== 'undefined') gapiLoaded();
  if (typeof google !== 'undefined' && google.accounts) gisLoaded();
}

function save() {
  if (driveConnected) {
    saveToDrive().catch(() => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setIndicator('● Sauvegardé localement', true);
    });
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setIndicator('● Sauvegardé localement', true);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 800);
  setIndicator('● En cours...', false);
}

  const m = {
    'Mail à envoyer':'st-mail-envoyer',

  const empty = document.getElementById('emptyMsg');
  const count = document.getElementById('countBadge');

  count.textContent = list.length + ' contact' + (list.length > 1 ? 's' : '');

  if (!list.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('statsBar').innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = list.map(c => `
    <tr class="${c.statut === 'Exclu' ? 'exclu' : ''}">
      <td class="nom-cell">
        <div class="nom">${c.nom || c.org}</div>
        ${c.org && c.org !== c.nom ? `<div class="org">${c.org}</div>` : ''}
      </td>
      <td><span class="badge badge-${c.secteur}">${c.secteur}</span></td>
      <td class="tel-cell">
        ${c.tel ? `<a href="tel:${c.tel}">${c.tel}</a>` : '<span style="color:#d1d5db">—</span>'}
        ${c.tel2 ? `<div class="tel2">${c.tel2}</div>` : ''}
      </td>
      <td class="email-cell" style="display:flex;align-items:center;gap:4px;">
        <span id="email-display-${c.id}">
          ${c.email
            ? isDuplicateEmail(c.email, c.id)
              ? `<a href="mailto:${c.email}" title="⚠ Email en double !" style="color:#e80729;font-weight:bold;" >${c.email.length > 22 ? c.email.substring(0,22)+'…' : c.email} ⚠</a>`
              : `<a href="mailto:${c.email}" title="${c.email}">${c.email.length > 22 ? c.email.substring(0,22)+'…' : c.email}</a>`
            : '<span class="no-email">—</span>'}
        </span>
        <button onclick="editEmail(${c.id})" title="Modifier l'email" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:11px;padding:1px 3px;flex-shrink:0;" onmouseover="this.style.color='#1A3A6B'" onmouseout="this.style.color='#9ca3af'">✎</button>
      </td>
      <td style="font-size:11px;color:#6b7280;">${c.canton || '—'}</td>
      <td style="text-align:center">
        <input type="checkbox" class="check-email" ${c.hasEmail ? 'checked' : ''} onchange="toggleEmail(${c.id}, this.checked)">
      </td>
      <td style="text-align:center">
        <input type="checkbox" class="check-pcad" ${c.palettecad ? 'checked' : ''} onchange="togglePcad(${c.id}, this.checked)" title="Client PaletteCAD">
      </td>
      <td>
        <select class="${statutClass(c.statut)}" onchange="updateStatut(${c.id}, this)">
          <option ${c.statut=='Mail à envoyer'?'selected':''}>Mail à envoyer</option>
          <option ${c.statut=='Mail envoyé'?'selected':''}>Mail envoyé</option>
          <option ${c.statut=='Réponse reçue'?'selected':''}>Réponse reçue</option>
          <option ${c.statut=='Intéressé'?'selected':''}>Intéressé</option>
          <option ${c.statut=='À relancer'?'selected':''}>À relancer</option>
          <option ${c.statut=='Pas intéressé'?'selected':''}>Pas intéressé</option>
          <option ${c.statut=='Exclu'?'selected':''}>Exclu</option>
        </select>
      </td>
      <td>
        <input type="date" class="date-input" value="${c.dateEnvoi || ''}" onchange="updateDate(${c.id}, this.value)">
      </td>
      <td>
        <input type="text" class="notes-input" placeholder="Notes…" value="${c.notes || ''}" onchange="updateNotes(${c.id}, this.value)">
      </td>
      <td>
        <button class="btn-del" onclick="askDelete(${c.id})" title="Supprimer">✕</button>
      </td>
    </tr>
  `).join('');

  // Stats
  const byStatut = {};
  list.forEach(c => { byStatut[c.statut] = (byStatut[c.statut]||0)+1; });
  const colors = {
    'Mail à envoyer':'#fbbf24','Mail envoyé':'#60a5fa',
    'Réponse reçue':'#34d399','Intéressé':'#10b981',
    'À relancer':'#f87171','Pas intéressé':'#d1d5db','Exclu':'#9ca3af'
  };
  document.getElementById('statsBar').innerHTML =
    Object.entries(byStatut).map(([s,n]) =>
      `<div class="stat-item"><div class="stat-dot" style="background:${colors[s]||'#999'}"></div>${s}: <b>${n}</b></div>`
    ).join('') +
    `<div class="stat-item" style="margin-left:auto"><div class="stat-dot" style="background:#1A3A6B"></div>Avec email: <b>${list.filter(c=>c.hasEmail).length}</b></div>`;
}

// FILTERS
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sec = document.getElementById('fSecteur').value;
  const sta = document.getElementById('fStatut').value;
  const em = document.getElementById('fEmail').value;
  const can = document.getElementById('fCanton').value;
  const pcad = document.getElementById('fPcad').value;

  let list = data.filter(c => {
    const text = (c.nom+' '+c.org+' '+(c.canton||'')+' '+c.tel+' '+c.email).toLowerCase();
    return (!q || text.includes(q))
      && (!sec || c.secteur === sec)
      && (!sta || c.statut === sta)
      && (em === '' || (em === '1' ? c.hasEmail : !c.hasEmail))
      && (!can || c.canton === can)
      && (pcad === '' || (pcad === '1' ? c.palettecad : !c.palettecad));
  });

  list.sort((a,b) => {
    const av = (a[sortCol]||'').toLowerCase();
    const bv = (b[sortCol]||'').toLowerCase();
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  render(list);
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  applyFilters();
}

// UPDATES
function updateStatut(id, sel) {
  const c = data.find(x => x.id === id);
  if (c) { c.statut = sel.value; sel.className = statutClass(sel.value); scheduleSave(); applyFilters(); }
}

function updateDate(id, val) {
  const c = data.find(x => x.id === id);
  if (c) { c.dateEnvoi = val; scheduleSave(); }
}

function updateNotes(id, val) {
  const c = data.find(x => x.id === id);
  if (c) { c.notes = val; scheduleSave(); }
}

function toggleEmail(id, checked) {
  const c = data.find(x => x.id === id);
  if (c) { c.hasEmail = checked; scheduleSave(); applyFilters(); }
}

function isDuplicateEmail(email, currentId) {
  if (!email || !email.includes('@')) return false;
  return data.some(c => c.id !== currentId && c.email && c.email.toLowerCase() === email.toLowerCase());
}

function togglePcad(id, checked) {
  const c = data.find(x => x.id === id);
  if (c) { c.palettecad = checked; scheduleSave(); applyFilters(); }
}

// DELETE
function askDelete(id) {
  deleteId = id;
  const c = data.find(x => x.id === id);
  document.getElementById('delModalName').textContent =
    `Voulez-vous supprimer "${c.nom || c.org}" ? Cette action est irréversible.`;
  document.getElementById('delModal').classList.add('show');
}

function confirmDelete() {
  data = data.filter(x => x.id !== deleteId);
  closeModal('delModal');
  scheduleSave();
  applyFilters();
}

// ADD
function openAddModal() {
  document.getElementById('addNom').value = '';
  document.getElementById('addOrg').value = '';
  document.getElementById('addTel').value = '';
  document.getElementById('addEmail').value = '';
  document.getElementById('addCanton').value = '';
  document.getElementById('addPcad').checked = false;
  document.getElementById('addModal').classList.add('show');
}

function confirmAdd() {
  const nom = document.getElementById('addNom').value.trim();
  const org = document.getElementById('addOrg').value.trim();
  const tel = document.getElementById('addTel').value.trim();
  const email = document.getElementById('addEmail').value.trim();
  const secteur = document.getElementById('addSecteur').value;
  const canton = document.getElementById('addCanton').value;
  const palettecad = document.getElementById('addPcad').checked;

  if (!nom && !org) { alert('Merci de saisir au moins un nom ou une société.'); return; }

  const newId = data.length ? Math.max(...data.map(x=>x.id)) + 1 : 0;
  data.push({
    id: newId,
    nom: nom || org,
    org: org,
    tel: tel,
    tel2: '',
    email: email,
    hasEmail: email.includes('@'),
    secteur: secteur,
    canton: canton,
    palettecad: palettecad,
    statut: 'Mail à envoyer',
    dateEnvoi: '',
    notes: ''
  });

  closeModal('addModal');
  scheduleSave();
  applyFilters();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// EXPORT
function exportCSV() {
  const rows = [['Nom','Organisation','Téléphone','Email','A un email','Secteur','Canton','Client PaletteCAD','Statut','Date envoi','Notes']];
  data.forEach(c => rows.push([c.nom,c.org,c.tel,c.email,c.hasEmail?'Oui':'Non',c.secteur,c.canton||'',c.palettecad?'Oui':'Non',c.statut,c.dateEnvoi,c.notes]));
  const csv = rows.map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF'+csv);
  a.download = 'CRM_KND_export.csv';
  a.click();
}

// EDIT EMAIL INLINE
function editEmail(id) {
  const c = data.find(x => x.id === id);
  if (!c) return;
  const span = document.getElementById('email-display-' + id);
  if (!span) return;
  const current = c.email || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.style.cssText = 'width:160px;padding:3px 6px;border:1px solid #1A3A6B;border-radius:4px;font-size:11px;outline:none;';
  input.placeholder = 'email@société.ch';
  span.innerHTML = '';
  span.appendChild(input);
  input.focus();
  input.select();
  function save() {
    const val = input.value.trim();
    c.email = val;
    c.hasEmail = val.includes('@');
    scheduleSave();
    applyFilters();
  }
  input.addEventListener('blur', () => {
    if (input.value && isDuplicateEmail(input.value.trim(), id)) {
      if (!confirm(`⚠ Cet email existe déjà chez un autre contact. Continuer quand même ?`)) {
        input.value = current;
      }
    }
    save();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { c.email = current; applyFilters(); }
  });
}

// Fermer modal en cliquant dehors
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});

init();
</script>
</body>
</html>
